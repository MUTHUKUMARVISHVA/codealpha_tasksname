<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h1>MyMusic</h1>
</nav>

<!-- MAIN CONTAINER -->
<div class="container">

  <div class="music-player">
    
    <img src="https://picsum.photos/300" id="cover" alt="cover">
    
    <h2 id="title">Song Title</h2>
    <p id="artist">Artist Name</p>

    <audio id="audio"></audio>

    <!-- PROGRESS BAR -->
    <div class="progress-container" onclick="setProgress(event)">
      <div class="progress" id="progress"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="togglePlay()" id="playBtn">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <!-- VOLUME -->
    <div class="volume">
      🔊 <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
    </div>

  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Modern Music Player | Internship Project</p>
</footer>

<script src="script.js"></script>
</body>
</html>
